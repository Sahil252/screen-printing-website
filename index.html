<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc}

header{
  background:#0f172a;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.hero{
  padding:15px;
  text-align:center;
}

.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card{
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.img{
  width:100%;
  height:140px;
  background-size:cover;
  background-position:center;
  border-radius:6px;
}

.title{font-size:14px;margin-top:5px}
.price{color:green;font-weight:bold}

.btn{
  background:#16a34a;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:6px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>OM Carry Bag</header>

<div class="hero">
  <h2>Carry Bag Printing</h2>
  <p>Bulk Orders • Custom Logo Printing</p>
</div>

<div class="container" id="products"></div>

<script>

// 🔥 YOUR IMAGES
const images = [
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKpMfb5VFu96Fu0sQaYmRapYAdbNeOa8vTiNUR5Kc6AA&s=10",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTau1SSSZzBu6NhJF8Z9lYdXNUygL9iyAHvSMYzFjPBtQ&s=10",
"https://satnamoverseas.in/wp-content/uploads/2023/04/Untitled-design-2023-05-10T161519.163.png",
"https://image.made-in-china.com/43f34j00NVKvkQtHZdbE/Eco-Friendly-Custom-Logo-Non-Woven-Tote-Bags-for-Shopping-Promotion.jpg",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTfIOHGfVUrjBKF4R33ZxANAIhu0iHufNCB92_cy3lxRX7Zorq0TZbq9d0&s=10",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzEvQU0m64coaQcl6qUYPDunFJ3EuvsQwkP39d1Z5U8g&s=10",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCH0MWMCRmwRrmfjuSTUAvCNzvSVz7WoAqnmrmLK9L9g&s=10"
];

// 🔥 AUTO PRODUCTS
let html="";

for(let i=1;i<=50;i++){
  let img = images[i % images.length];

  html += `
  <div class="card">
    <div class="img" style="background-image:url('${img}')"></div>
    <div class="title">Carry Bag ${i}</div>
    <div class="price">₹4 – ₹10 / bag</div>
    <div class="btn" onclick="order('Carry Bag ${i}')">Get Quote</div>
  </div>`;
}

document.getElementById("products").innerHTML = html;

// WHATSAPP
function order(name){
  window.open("https://wa.me/916307304325?text=Hi I want "+name);
}

</script>

</body>
</html>
