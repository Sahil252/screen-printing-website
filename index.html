<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body{font-family:Arial;margin:0;background:#f1f3f6}

/* LOGIN */
.login{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:20px;
}
input{padding:10px}
button{padding:10px;background:#2874f0;color:white;border:none}

/* HEADER */
header{
  background:#2874f0;
  color:white;
  padding:10px;
}

/* PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.card{
  background:white;
  padding:10px;
}
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}
.btn{
  background:#fb641b;
  color:white;
  padding:8px;
  margin-top:5px;
  text-align:center;
}

/* CART */
.cart{
  padding:10px;
  background:white;
  margin:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
OM Carry Bag
<button onclick="showCart()">Cart</button>
<button onclick="logout()">Logout</button>
</header>

<div id="products" class="grid"></div>

<div id="cart" style="display:none" class="cart"></div>

<div id="admin" style="display:none"></div>

</div>

<script>

let role="";
let cart=[];
let orders=[];

// LOGIN
function login(){
 let m=document.getElementById("mobile").value;
 let p=document.getElementById("pass").value;

 if(m=="6307304325" && p=="6307304325"){
   role="admin";
 }
 else if(m=="6307304324" && p=="6307304324"){
   role="user";
 }
 else{
   alert("Invalid");
   return;
 }

 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";

 renderProducts();

 if(role=="admin") showAdmin();
}

// PRODUCTS
const products=[
{ name:"Paper Bag", price:8, img:"https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto/q_auto:best/india%20lob/paper%20bags/in_paper-bags_001"},
{ name:"Premium Paper Bag", price:10, img:"https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto/q_auto:best/India%20LOB/Premium%20option%20in%20paper%20bag/Premium_option_in_Paper_bags_02"},
{ name:"D-Cut Bag", price:5, img:"https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto/q_auto:best/India%20LOB/Non%20Woven%20bags/Non_Woven_bag_Marquee_1"},
{ name:"D-Cut Premium", price:6, img:"https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto/q_auto:best/India%20LOB/Non%20Woven%20bags/Non_Woven_bag_Marquee_2"},
{ name:"Loop Bag", price:7, img:"https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto/q_auto:best/India%20LOB/Metallic%20Shopping%20Bag/Metallic_Shopping_Bag_Marquee_1"}
];

function renderProducts(){
 let html="";
 products.forEach((p,i)=>{
   html+=`
   <div class="card">
     <img src="${p.img}">
     <div>${p.name}</div>
     <div>₹${p.price}</div>
     <div class="btn" onclick="addCart(${i})">Add to Cart</div>
   </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

// CART
function addCart(i){
 cart.push(products[i]);
 alert("Added");
}

function showCart(){
 let html="<h3>Cart</h3>";
 cart.forEach(p=>{
   html+=`<div>${p.name} - ₹${p.price}</div>`;
 });
 html+=`<button onclick="placeOrder()">Place Order</button>`;
 document.getElementById("cart").style.display="block";
 document.getElementById("cart").innerHTML=html;
}

// ORDER
function placeOrder(){
 orders.push([...cart]);
 cart=[];
 alert("Order placed");
}

// ADMIN
function showAdmin(){
 let html="<h2>Admin Panel</h2>";
 orders.forEach((o,i)=>{
   html+=`<div>Order ${i+1}: ${o.map(x=>x.name).join(", ")}</div>`;
 });
 document.getElementById("admin").innerHTML=html;
 document.getElementById("admin").style.display="block";
}

// LOGOUT
function logout(){
 location.reload();
}

</script>

</body>
</html>
