<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Saumya ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:linear-gradient(to right, #ff9a9e, #fad0c4);
  color:white;
}

.heart{
  font-size:50px;
  animation: beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

h1{
  margin-top:50px;
}

.message{
  padding:20px;
  font-size:18px;
}

button{
  padding:12px 20px;
  border:none;
  background:white;
  color:#ff4d6d;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  margin:10px;
}
</style>
</head>

<body>

<h1>❤️ For My Love Saumya ❤️</h1>

<div class="heart">💖</div>

<div class="message">
  <p>
    Dear Saumya,<br><br>
    You are the most beautiful part of my life.  
    Every moment with you feels special.  
    I may not say it every day, but you mean everything to me. ❤️  
    <br><br>
    I am lucky to have you in my life.  
    Thank you for being with me always.  
  </p>
</div>

<button onclick="playMusic()">Play Music 🎵</button>
<button onclick="showLove()">Click Here ❤️</button>

<!-- MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function showLove(){
  alert("I Love You Saumya ❤️ Forever ♾️");
}

function playMusic(){
  document.getElementById("bgmusic").play();
}
</script>

</body>
</html>
