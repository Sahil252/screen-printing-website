<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#2874f0;
  padding:10px;
  color:white;
  font-weight:bold;
}

/* SEARCH */
.search{
  padding:10px;
  background:white;
}
.search input{
  width:100%;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* CATEGORY */
.categories{
  display:flex;
  overflow-x:auto;
  background:white;
}
.cat{
  padding:10px;
  text-align:center;
  min-width:80px;
  font-size:12px;
}

/* BANNER */
.banner img{
  width:100%;
}

/* PRODUCT GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:5px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.title{
  font-size:14px;
}

.price{
  color:green;
  font-weight:bold;
}

.btn{
  background:#fb641b;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:5px;
  border-radius:5px;
  font-size:12px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
}
</style>
</head>

<body>

<header>OM Carry Bag</header>

<div class="search">
  <input placeholder="Search carry bags...">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <div class="cat">D-Cut</div>
  <div class="cat">Loop</div>
  <div class="cat">Paper</div>
  <div class="cat">Printed</div>
  <div class="cat">Bulk</div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=800">
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<div class="whatsapp" onclick="orderNow('Bulk Order')">WA</div>

<script>

// ✅ FIXED WORKING IMAGES
const images = [
"https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=400",
"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400",
"https://images.unsplash.com/photo-1600180758890-6b94519a8ba5?w=400",
"https://images.unsplash.com/photo-1607082349566-187342175e2f?w=400"
];

const sizes = ["8x10", "10x12", "12x16", "14x18"];
const prices = ["₹3", "₹4", "₹5", "₹6"];

let html = "";

// 50 PRODUCTS (fast + clean)
for(let i=0;i<50;i++){
  html += `
  <div class="card">
    <img src="${images[i%4]}">
    <div class="title">Non Woven Bag ${i+1}</div>
    <div>Size: ${sizes[i%4]}</div>
    <div class="price">${prices[i%4]}</div>
    <div class="btn" onclick="orderNow('Non Woven Bag ${i+1}')">Order</div>
  </div>
  `;
}

document.getElementById("products").innerHTML = html;

// WhatsApp
function orderNow(product){
  window.open(`https://wa.me/916307304325?text=Hi I want ${product}`);
}

</script>

</body>
</html>
