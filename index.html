<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}

/* HEADER */
header{
  background:#2874f0;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}
header img{
  width:30px;
}
header h2{margin:0;font-size:18px}

/* SEARCH */
.search{padding:10px;background:white}
.search input{
  width:100%;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* CATEGORY */
.categories{
  display:flex;
  overflow-x:auto;
  background:white;
}
.cat{
  padding:10px;
  min-width:80px;
  text-align:center;
  cursor:pointer;
  font-size:13px;
}

/* PRODUCT GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.card{
  background:white;
  padding:10px;
  border-radius:5px;
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}
.title{font-size:14px}
.price{color:green;font-weight:bold}
.btn{
  background:#fb641b;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:5px;
  border-radius:5px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/3082/3082031.png">
  <h2>OM Carry Bag</h2>
</header>

<div class="search">
  <input id="search" placeholder="Search bags...">
</div>

<div class="categories">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('dcut')">D-Cut</div>
  <div class="cat" onclick="filter('loop')">Loop</div>
  <div class="cat" onclick="filter('paper')">Paper</div>
</div>

<div class="container" id="products"></div>

<script>

// ✅ REAL CATEGORY IMAGES
const products = [
  {name:"D-Cut Bag 10x12",cat:"dcut",price:"₹4",
   img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=400"},
  {name:"D-Cut Bag 12x16",cat:"dcut",price:"₹5",
   img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400"},
  {name:"Loop Bag Premium",cat:"loop",price:"₹6",
   img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba5?w=400"},
  {name:"Loop Bag Large",cat:"loop",price:"₹7",
   img:"https://images.unsplash.com/photo-1607082349566-187342175e2f?w=400"},
  {name:"Paper Bag Small",cat:"paper",price:"₹5",
   img:"https://images.unsplash.com/photo-1607082349566-187342175e2f?w=400"},
  {name:"Paper Bag Large",cat:"paper",price:"₹6",
   img:"https://images.unsplash.com/photo-1580910051074-3eb694886505?w=400"},
];

// duplicate to make more products
let fullList = [];
for(let i=0;i<5;i++){ fullList = fullList.concat(products); }

let current = fullList;

// 🔥 render
function render(list){
  let html="";
  list.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <div class="title">${p.name}</div>
      <div>Category: ${p.cat}</div>
      <div class="price">${p.price}</div>
      <div class="btn" onclick="order('${p.name}')">Order</div>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

// 🔥 filter
function filter(cat){
  if(cat=="all") current=fullList;
  else current=fullList.filter(p=>p.cat==cat);
  render(current);
}

// 🔥 search
document.getElementById("search").addEventListener("input", function(){
  let val=this.value.toLowerCase();
  let filtered=current.filter(p=>p.name.toLowerCase().includes(val));
  render(filtered);
});

// WhatsApp
function order(name){
  window.open(`https://wa.me/916307304325?text=Hi I want ${name}`);
}

// initial load
render(fullList);

</script>

</body>
</html>
