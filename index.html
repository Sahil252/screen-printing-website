<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Saumya ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:linear-gradient(to right, #ff9a9e, #fad0c4);
  color:white;
}

h1{margin-top:40px;}

.heart{
  font-size:50px;
  animation: beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.message{
  padding:20px;
  font-size:18px;
}

button{
  padding:12px 20px;
  border:none;
  background:white;
  color:#ff4d6d;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  margin:8px;
}

/* GIF section */
#surprise{
  display:none;
  margin-top:20px;
}

#surprise img{
  width:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>❤️ For My Love Saumya ❤️</h1>

<div class="heart">💖</div>

<div class="message">
  <p>
    Dear Saumya,<br><br>
    You are my happiness, my peace, and my everything ❤️  
    I feel lucky every day to have you in my life.  
  </p>
</div>

<button onclick="playMusic()">▶️ Play Music</button>
<button onclick="stopMusic()">⏸ Stop Music</button>
<br>
<button onclick="showLove()">Click for Surprise 💖</button>

<!-- GIF + TEXT -->
<div id="surprise">
  <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
  <p style="font-size:18px;">
    I love you so much Saumya ❤️  
    Thank you for being mine forever 🤗💖
  </p>
</div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f3c1b7b7.mp3?filename=romantic-love-11786.mp3" type="audio/mpeg">
</audio>

<script>

function playMusic(){
  document.getElementById("bgmusic").play();
}

function stopMusic(){
  document.getElementById("bgmusic").pause();
}

function showLove(){
  document.getElementById("surprise").style.display="block";
}

</script>

</body>
</html>
