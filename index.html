<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
  background:#0f172a;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}
.menu{font-size:22px;cursor:pointer}
.logo{font-weight:bold;font-size:18px}

/* SEARCH */
.search{flex:1}
.search input{
  width:100%;
  padding:8px;
  border-radius:5px;
  border:none;
}

/* SIDEMENU */
.sidemenu{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:white;
  transition:0.3s;
  padding:20px;
}
.sidemenu a{
  display:block;
  padding:10px 0;
  color:black;
  text-decoration:none;
}

/* HERO */
.hero{
  background:url("https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=800") center/cover;
  color:white;
  padding:40px 20px;
}
.hero h1{margin:0}
.hero p{margin:5px 0}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:8px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.price{color:green;font-weight:bold}

.btn{
  background:#16a34a;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidemenu" id="menu">
  <h3>OM Carry Bag</h3>
  <a href="#">Home</a>
  <a href="#">Bulk Orders</a>
  <a href="#">Contact</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="logo">OM Carry Bag</div>
  <div class="search">
    <input placeholder="Search bags...">
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Carry Bag Printing</h1>
  <p>Bulk orders • Custom logo printing • Best price</p>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<script>

// MENU FIX
function toggleMenu(){
 let m=document.getElementById("menu");
 m.style.left = (m.style.left=="0px") ? "-260px" : "0px";
}

// ONLY BAG IMAGES
const products=[
{
 name:"Non Woven Bag",
 price:"₹4 - ₹6",
 img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=400"
},
{
 name:"Printed Carry Bag",
 price:"₹5 - ₹7",
 img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400"
},
{
 name:"Shopping Bag",
 price:"₹6 - ₹8",
 img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba5?w=400"
},
{
 name:"Paper Bag",
 price:"₹5 - ₹7",
 img:"https://images.unsplash.com/photo-1607082349566-187342175e2f?w=400"
}
];

// RENDER
let html="";
products.forEach(p=>{
 html+=`
 <div class="card">
  <img src="${p.img}">
  <div>${p.name}</div>
  <div class="price">${p.price}</div>
  <div class="btn" onclick="order('${p.name}')">Order on WhatsApp</div>
 </div>`;
});

document.getElementById("products").innerHTML=html;

// ORDER
function order(name){
 window.open(`https://wa.me/916307304325?text=Hi I want ${name}`);
}

</script>

</body>
</html>
