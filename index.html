<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Life Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }
    h2 {
      text-align: center;
    }
    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      font-size: 16px;
    }
    input[type="checkbox"] {
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Daily Life Helper</h2>

  <!-- Meal Planner -->
  <div class="card">
    <h3>🍛 Meal Planner</h3>
    <select id="mealType">
      <option value="veg">Veg</option>
      <option value="nonveg">Non-Veg</option>
    </select>
    <button onclick="generateMeal()">Suggest Meal</button>
    <p id="mealResult"></p>
  </div>

  <!-- Grocery List -->
  <div class="card">
    <h3>🛒 Grocery List</h3>
    <button onclick="generateGrocery()">Generate List</button>
    <div id="groceryList"></div>
  </div>

  <!-- Reminder -->
  <div class="card">
    <h3>⏰ Reminder</h3>
    <input type="text" id="reminderText" placeholder="Enter reminder">
    <button onclick="saveReminder()">Save Reminder</button>
    <ul id="reminderList"></ul>
  </div>

</div>

<script>
  const vegMeals = ["Dal Rice", "Paneer Sabji", "Mix Veg", "Khichdi"];
  const nonVegMeals = ["Chicken Curry", "Egg Bhurji", "Fish Fry"];

  function generateMeal() {
    let type = document.getElementById("mealType").value;
    let meals = type === "veg" ? vegMeals : nonVegMeals;
    let random = meals[Math.floor(Math.random() * meals.length)];
    document.getElementById("mealResult").innerText = "Today: " + random;
  }

  function generateGrocery() {
    let items = ["Aloo", "Pyaz", "Tamatar", "Dhaniya", "Milk"];
    let html = "";
    items.forEach(item => {
      html += <div><input type="checkbox"> ${item}</div>;
    });
    document.getElementById("groceryList").innerHTML = html;
  }

  function saveReminder() {
    let text = document.getElementById("reminderText").value;
    if (!text) return;

    let reminders = JSON.parse(localStorage.getItem("reminders")) || [];
    reminders.push(text);
    localStorage.setItem("reminders", JSON.stringify(reminders));

    document.getElementById("reminderText").value = "";
    loadReminders();
  }

  function loadReminders() {
    let reminders = JSON.parse(localStorage.getItem("reminders")) || [];
    let html = "";
    reminders.forEach(r => {
      html += `<li>${r}</li>`;
    });
    document.getElementById("reminderList").innerHTML = html;
  }

  loadReminder
