<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Free WhatsApp Message Generator</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc}

/* HEADER */
header{
  background:#16a34a;
  color:white;
  padding:15px;
  text-align:center;
}

/* HERO */
.hero{
  padding:20px;
  text-align:center;
}

.container{
  padding:15px;
}

/* FORM */
.box{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:12px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:5px;
  margin-top:5px;
}

/* RESULT */
.result{
  background:#e6ffe6;
  padding:10px;
  margin-top:10px;
}

/* CTA */
.cta{
  background:#0f172a;
  color:white;
  padding:20px;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <h2>Free WhatsApp Message Generator</h2>
</header>

<div class="hero">
  <h3>Create Business Messages in Seconds 🚀</h3>
  <p>Generate WhatsApp messages for customers, orders, and marketing</p>
</div>

<div class="container">

  <div class="box">
    <h3>Generate Message</h3>

    <input id="name" placeholder="Customer Name">
    <input id="product" placeholder="Product / Service">
    <input id="price" placeholder="Price">

    <select id="type">
      <option>Order Confirmation</option>
      <option>Offer Message</option>
      <option>Follow Up</option>
    </select>

    <button onclick="generate()">Generate Message</button>

    <div id="output" class="result"></div>

    <button onclick="send()">Send on WhatsApp</button>
  </div>

  <!-- AD PLACE -->
  <div style="background:#eee;padding:20px;text-align:center;margin:10px">
    Advertisement
  </div>

</div>

<!-- CTA -->
<div class="cta">
  <h3>Need a Website for Your Business?</h3>
  <p>Get your professional website in just ₹2999</p>
  <button onclick="contact()">Contact Me</button>
</div>

<script>

let finalMsg="";

function generate(){
  let name=document.getElementById("name").value;
  let product=document.getElementById("product").value;
  let price=document.getElementById("price").value;
  let type=document.getElementById("type").value;

  if(type=="Order Confirmation"){
    finalMsg=`Hello ${name}, your order for ${product} has been confirmed. Total amount is ₹${price}. Thank you!`;
  }
  else if(type=="Offer Message"){
    finalMsg=`Hi ${name}, we have a special offer on ${product} for just ₹${price}. Grab now!`;
  }
  else{
    finalMsg=`Hello ${name}, just following up regarding ${product}. Let us know if you're interested.`;
  }

  document.getElementById("output").innerText=finalMsg;
}

function send(){
  window.open("https://wa.me/?text="+encodeURIComponent(finalMsg));
}

function contact(){
  window.open("https://wa.me/916307304325?text=Hi I want website");
}

</script>

</body>
</html>
