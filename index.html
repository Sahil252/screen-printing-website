<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WhatsApp Message Generator Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
  background:#16a34a;
  color:white;
  padding:15px;
  text-align:center;
}

/* TABS */
.tabs{
  display:flex;
  background:white;
}
.tab{
  flex:1;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

/* ACTIVE */
.active{background:#16a34a;color:white}

/* CONTENT */
.container{padding:15px}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  padding:10px;
  width:100%;
  background:#16a34a;
  color:white;
  border:none;
  margin-top:5px;
}

/* RESULT */
.result{
  background:#e6ffe6;
  padding:10px;
  margin-top:10px;
}

/* HIDE */
.hide{display:none}
</style>
</head>

<body>

<header>
  <h2>WhatsApp Generator Pro 🚀</h2>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('single')">Single</div>
  <div class="tab" onclick="showTab('bulk')">Bulk</div>
  <div class="tab" onclick="showTab('history')">History</div>
</div>

<div class="container">

<!-- SINGLE -->
<div id="single" class="box">
<h3>Single Message</h3>

<input id="name" placeholder="Name">
<input id="product" placeholder="Product">
<input id="price" placeholder="Price">

<select id="type">
<option>Order</option>
<option>Offer</option>
<option>Follow Up</option>
</select>

<button onclick="generate()">Generate</button>

<div id="output" class="result"></div>

<button onclick="copy()">Copy</button>
<button onclick="send()">Send WhatsApp</button>
</div>

<!-- BULK -->
<div id="bulk" class="box hide">
<h3>Bulk Messages</h3>

<textarea id="names" placeholder="Enter names (comma separated)"></textarea>
<input id="bproduct" placeholder="Product">

<button onclick="bulkGenerate()">Generate Bulk</button>

<div id="bulkOutput" class="result"></div>
</div>

<!-- HISTORY -->
<div id="history" class="box hide">
<h3>History</h3>
<div id="historyList"></div>
</div>

</div>

<!-- CTA -->
<div style="background:#0f172a;color:white;padding:20px;text-align:center">
<h3>Need Website?</h3>
<p>Get business website in ₹2999</p>
<button onclick="contact()">Contact</button>
</div>

<script>

let finalMsg="";

// TAB SWITCH
function showTab(id){
 document.querySelectorAll('.box').forEach(x=>x.classList.add('hide'));
 document.getElementById(id).classList.remove('hide');

 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 event.target.classList.add('active');
}

// GENERATE
function generate(){
 let name=nameInput("name");
 let product=nameInput("product");
 let price=nameInput("price");
 let type=document.getElementById("type").value;

 if(type=="Order"){
  finalMsg=`Hello ${name}, your order for ${product} is confirmed. Amount ₹${price}`;
 }
 else if(type=="Offer"){
  finalMsg=`Hi ${name}, special offer on ${product} at ₹${price}. Hurry!`;
 }
 else{
  finalMsg=`Hello ${name}, following up for ${product}.`;
 }

 document.getElementById("output").innerText=finalMsg;

 saveHistory(finalMsg);
}

// BULK
function bulkGenerate(){
 let names=document.getElementById("names").value.split(",");
 let product=document.getElementById("bproduct").value;

 let result="";
 names.forEach(n=>{
  result+=`Hi ${n.trim()}, check ${product}\n\n`;
 });

 document.getElementById("bulkOutput").innerText=result;
}

// COPY
function copy(){
 navigator.clipboard.writeText(finalMsg);
 alert("Copied!");
}

// SEND
function send(){
 window.open("https://wa.me/?text="+encodeURIComponent(finalMsg));
}

// CONTACT
function contact(){
 window.open("https://wa.me/916307304325?text=I want website");
}

// HISTORY
function saveHistory(msg){
 let list=JSON.parse(localStorage.getItem("msgs")||"[]");
 list.push(msg);
 localStorage.setItem("msgs",JSON.stringify(list));
 loadHistory();
}

function loadHistory(){
 let list=JSON.parse(localStorage.getItem("msgs")||"[]");
 let html="";
 list.forEach(x=>html+=`<div>${x}</div><hr>`);
 document.getElementById("historyList").innerHTML=html;
}

function nameInput(id){
 return document.getElementById(id).value || "";
}

loadHistory();

</script>

</body>
</html>
