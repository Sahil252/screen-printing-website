<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body { margin:0; font-family:Arial; background:#f1f3f6; }

header {
  background:#2874f0;
  color:white;
  padding:12px;
  text-align:center;
  font-size:20px;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.title {
  font-size:14px;
  margin:5px 0;
}

.price {
  color:green;
  font-weight:bold;
}

.btn {
  background:#fb641b;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:5px;
  border-radius:5px;
  font-size:14px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
}
</style>
</head>

<body>

<header>OM Carry Bag</header>

<div class="container" id="products"></div>

<div class="whatsapp" onclick="orderNow('General Inquiry')">WA</div>

<script>

// 🔥 PRODUCT DATA (yahan se sab control hoga)
const products = [];

// 100 products auto generate
const sizes = ["8x10", "10x12", "12x16", "14x18"];
const prices = ["₹3", "₹4", "₹5", "₹6"];

for(let i=1;i<=100;i++){
  products.push({
    name: "Non Woven Bag " + i,
    size: sizes[i % 4],
    price: prices[i % 4],
    img: "https://source.unsplash.com/300x300/?shopping-bag"
  });
}

// 🔥 UI render
const container = document.getElementById("products");

products.forEach(p => {
  container.innerHTML += `
    <div class="card">
      <img src="${p.img}">
      <div class="title">${p.name}</div>
      <div>Size: ${p.size}</div>
      <div class="price">${p.price}</div>
      <div class="btn" onclick="orderNow('${p.name}')">Order</div>
    </div>
  `;
});

// WhatsApp
function orderNow(product){
  window.open(`https://wa.me/916307304325?text=Hi I want ${product}`);
}

</script>

</body>
</html>
