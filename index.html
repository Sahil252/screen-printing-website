<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OM Carry Bag</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc}

/* HEADER */
header{
  background:#0f172a;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

/* HERO */
.hero{
  padding:20px;
  text-align:center;
}
.hero h1{margin:0}
.hero p{color:#555}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card{
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:6px;
}

.title{font-size:14px;margin-top:5px}
.price{color:green;font-weight:bold}

.btn{
  background:#16a34a;
  color:white;
  padding:8px;
  text-align:center;
  margin-top:6px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>OM Carry Bag</header>

<div class="hero">
  <h1>Carry Bag Printing</h1>
  <p>Bulk Orders • Custom Logo Printing • Best Price</p>
</div>

<div class="container">

  <!-- PAPER BAG -->
  <div class="card">
    <img src="https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto,q_auto:best/india%20lob/paper%20bags/in_paper-bags_001">
    <div class="title">Paper Bags</div>
    <div class="price">₹6 – ₹10 / bag</div>
    <div class="btn" onclick="order('Paper Bag')">Get Quote</div>
  </div>

  <div class="card">
    <img src="https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto,q_auto:best/India%20LOB/Premium%20option%20in%20paper%20bag/Premium_option_in_Paper_bags_02">
    <div class="title">Premium Paper Bag</div>
    <div class="price">₹8 – ₹12 / bag</div>
    <div class="btn" onclick="order('Premium Paper Bag')">Get Quote</div>
  </div>

  <!-- D CUT -->
  <div class="card">
    <img src="https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto,q_auto:best/India%20LOB/Non%20Woven%20bags/Non_Woven_bag_Marquee_1">
    <div class="title">D-Cut Bag</div>
    <div class="price">₹4 – ₹6 / bag</div>
    <div class="btn" onclick="order('D-Cut Bag')">Get Quote</div>
  </div>

  <div class="card">
    <img src="https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto,q_auto:best/India%20LOB/Non%20Woven%20bags/Non_Woven_bag_Marquee_2">
    <div class="title">D-Cut Premium</div>
    <div class="price">₹5 – ₹7 / bag</div>
    <div class="btn" onclick="order('D-Cut Premium')">Get Quote</div>
  </div>

  <!-- LOOP -->
  <div class="card">
    <img src="https://cms.cloudinary.vpsvc.com/image/upload/if_ar_gt_1.1/c_scale,w_816/f_auto,q_auto:best/India%20LOB/Metallic%20Shopping%20Bag/Metallic_Shopping_Bag_Marquee_1">
    <div class="title">Loop Handle Bag</div>
    <div class="price">₹7 – ₹12 / bag</div>
    <div class="btn" onclick="order('Loop Bag')">Get Quote</div>
  </div>

</div>

<script>
function order(name){
  window.open("https://wa.me/916307304325?text=Hi I want "+name);
}
</script>

</body>
</html>
